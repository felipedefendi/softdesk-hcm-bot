<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rodizio HCM - Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="tela-login" class="tela">
    <form id="form-login" class="cartao cartao-login">
      <h1>Rodizio HCM</h1>
      <p>Digite a senha do dashboard</p>
      <input type="password" id="senha" placeholder="Senha" autofocus />
      <button type="submit">Entrar</button>
      <p id="erro-login" class="erro"></p>
    </form>
  </div>

  <div id="tela-dashboard" class="tela oculto">
    <header>
      <h1>Rodizio HCM - Dashboard</h1>
      <button id="btn-logout" class="botao-secundario">Sair</button>
    </header>

    <section class="cartao">
      <h2>Status da automacao</h2>
      <div id="status-conteudo">Carregando...</div>
      <p>Revezamento: <strong id="automacao-status">-</strong></p>
      <button id="btn-pausar-automacao">Pausar revezamento</button>
      <button id="btn-retomar-automacao">Retomar revezamento</button>
      <button id="btn-verificar-agora">Forcar verificacao agora</button>
      <p id="verificar-resultado"></p>
    </section>

    <section class="cartao">
      <h2>Rodizio</h2>
      <p>Proximo atendente: <strong id="rodizio-proximo">-</strong></p>
      <div class="linha-acao">
        <select id="rodizio-select"></select>
        <button id="btn-definir-proximo">Definir como proximo</button>
      </div>
      <p id="rodizio-resultado"></p>
    </section>

    <section class="cartao">
      <h2>Atendentes</h2>
      <table id="tabela-atendentes">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Status</th>
            <th>Motivo</th>
            <th>Retorna em</th>
            <th>Acao</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="cartao">
      <h2>Configuracoes</h2>
      <form id="form-config">
        <label>
          Intervalo de verificacao (minutos)
          <input type="number" id="cfg-intervalo" min="1" />
        </label>
        <label>
          Limite de SLA de Encaminhamento (minutos)
          <input type="number" id="cfg-limite" min="1" />
        </label>
        <button type="submit">Salvar configuracoes</button>
      </form>
    </section>

    <section class="cartao">
      <h2>Historico de encaminhamentos</h2>
      <table id="tabela-log">
        <thead>
          <tr>
            <th>Horario</th>
            <th>Chamado</th>
            <th>Cliente / Titulo</th>
            <th>Atendente</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
